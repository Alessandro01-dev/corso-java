spring.application.name=p_110_customers-orders

# Connessione al database
spring.datasource.url=jdbc:mysql://localhost:8889/corso_java?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=scott
spring.datasource.password=tiger
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
## spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8080

logging.level.root=INFO
logging.level.org.springframework.jdbc.datasource.init=DEBUG

## per creare la base dati in automatico
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql,classpath:data-generate.sql