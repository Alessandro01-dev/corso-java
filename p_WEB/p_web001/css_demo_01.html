<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dimensionamenti</title>
    <style>
      /* CSS3 container */
      img /* selettore type */ {
        border: 1px solid red;
        width: 300px;
        height: 200px;
      }

      /* .immagine_lunga selettore class {
        border: 1px solid blue;
        width: 600px;
        height: 400px;
      } */

      div img /* selettori combinati */ {
        border: 1px solid blue;
        width: 600px;
        height: 400px;
      }
    </style>
  </head>
  <body>
    <h1>Dimensionamenti</h1>
    <a href="./css_demo_02.html">vai a css_demo_02.html</a>
    <br />
    <img src="./images/italia-flag_553×370.jpg" alt="bandiera italiana" />
    <br />
    <img src="./images/europa-flag_452×292.jpg" alt="bandiera europea" />
    <br />
    <div class="">
      <img class="immagine_lunga" src="./images/granchio.webp" alt="granchio" />
      <br />
      <img
        class="immagine_lunga"
        src="./images/arcobaleno.jpeg"
        alt="arcobaleno"
      />
    </div>
  </body>
</html>
